services:
  - type: web
    name: accommodation-manager-backend
    runtime: node
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health/live
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
