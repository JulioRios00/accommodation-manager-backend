name: Keep Alive

on:
  schedule:
    - cron: '*/14 * * * *'  # every 14 minutes

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.BACKEND_URL }}/api/health/live")
          echo "Response: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
